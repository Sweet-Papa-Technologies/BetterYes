name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck + gate smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      # Gate-only smoke: no LiteLLM / Claude / secrets needed. Proves the PreToolUse rule gate
      # denies a planted forbidden write and allows a normal one — on every OS, so the gate's
      # path/glob/symlink logic doesn't silently rot on Linux or Windows.
      - name: Rule-gate smoke
        env:
          FOREMAN_TOKEN: ci-dummy-token
        run: pnpm foreman smoke --no-full
